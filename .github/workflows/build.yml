name: Build VibePlayer APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Show all files in repo
        run: find . -name "*.kts" -o -name "*.kt" -o -name "*.xml" -o -name "*.yml" | grep -v ".gradle" | grep -v "build/"

      - name: Show app/build.gradle.kts content
        run: cat app/build.gradle.kts || echo "FILE NOT FOUND"

      - name: Show settings.gradle.kts content
        run: cat settings.gradle.kts || echo "FILE NOT FOUND"

      - name: List Gradle tasks in app
        run: gradle :app:tasks --all || echo "Cannot list tasks"

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VibePlayer-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
