name: Build VibePlayer APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fL \
            "https://search.maven.org/remotecontent?filepath=org/gradle/gradle-wrapper/8.9/gradle-wrapper-8.9.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | grep -E "(error|Error|FAILED|warning|BUILD)" | tail -80

      - name: Build (full output on failure)
        if: failure()
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VibePlayer-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
